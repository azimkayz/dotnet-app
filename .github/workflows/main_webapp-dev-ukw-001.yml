name: Build and Deploy ASP.NET Core App to Azure Web App - webapp-dev-ukw-001

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore dependencies
        run: dotnet restore ./DotNetCoreSqlDb.csproj

      - name: Build
        run: dotnet build ./DotNetCoreSqlDb.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal
        continue-on-error: true

      - name: Publish
        run: dotnet publish ./DotNetCoreSqlDb.csproj --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9964DDA4CA5840ADB5E50E6842777356 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1C0CE0A86263400283D4BFB9BFC6D36B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_48C88CBC351F4339B5A25E98ECEBECFF }}

      - name: Set startup command
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config set \
              --name webapp-dev-ukw-001 \
              --resource-group <YOUR_RESOURCE_GROUP> \
              --startup-file "dotnet DotNetCoreSqlDb.dll"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'webapp-dev-ukw-001'
          slot-name: 'Production'
          package: ./publish

      - name: Verify deployment
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp show \
              --name webapp-dev-ukw-001 \
              --resource-group <YOUR_RESOURCE_GROUP> \
              --query "{state:state, hostName:defaultHostName}" \
              --output table
